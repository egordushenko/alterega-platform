<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="850" viewBox="0 0 1400 850" role="img" aria-label="Update delivery flow">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1400" height="850" fill="#0f172a"/>
  <rect x="40" y="40" width="1320" height="770" rx="24" fill="#ffffff"/>
  <text x="80" y="100" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="#0f172a">Update delivery flow</text>
  <line x1="80" y1="125" x2="1320" y2="125" stroke="#cbd5e1" stroke-width="2"/>
  
  
  <g>
    <rect x="110" y="330" width="190" height="70" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <text x="205" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Product build</text>
  </g>
  
  <g>
    <rect x="350" y="330" width="190" height="70" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <text x="445" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Version check</text>
  </g>
  
  <g>
    <rect x="590" y="220" width="200" height="70" rx="12" fill="#ecfdf5" stroke="#94a3b8" stroke-width="2"/>
    <text x="690" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Continue work</text>
  </g>
  
  <g>
    <rect x="590" y="330" width="200" height="70" rx="12" fill="#fef3c7" stroke="#94a3b8" stroke-width="2"/>
    <text x="690" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Optional notice</text>
  </g>
  
  <g>
    <rect x="590" y="440" width="200" height="70" rx="12" fill="#fee2e2" stroke="#94a3b8" stroke-width="2"/>
    <text x="690" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Required update</text>
  </g>
  
  <g>
    <rect x="850" y="330" width="200" height="70" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <text x="950" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Download artifact</text>
  </g>
  
  <g>
    <rect x="1110" y="330" width="190" height="70" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <text x="1205" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Install package</text>
  </g>
  
  <line x1="300" y1="365" x2="350" y2="365" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="325" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">open</text>
  
  <line x1="540" y1="350" x2="590" y2="255" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="565" y="294.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">current</text>
  
  <line x1="540" y1="365" x2="590" y2="365" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="565" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">newer</text>
  
  <line x1="540" y1="380" x2="590" y2="475" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="565" y="419.5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">blocked</text>
  
  <line x1="790" y1="365" x2="850" y2="365" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="820" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">get</text>
  
  <line x1="1050" y1="365" x2="1110" y2="365" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1080" y="357" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">apply</text>
  
  <line x1="1205" y1="330" x2="1205" y2="220" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="1205" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#334155">restart</text>

</svg>
